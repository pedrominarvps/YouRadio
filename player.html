<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouRadio Pro - Cinematic Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap');

    :root { --gold:#fbbf24; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Inter',sans-serif; background:#0a0a0a; color:#fff; overflow:hidden; }

    .video-background { position:fixed; inset:0; z-index:-2; pointer-events:none; }
    .video-overlay {
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(circle at 15% 20%, rgba(251,191,36,.16), transparent 35%),
        linear-gradient(to right, rgba(0,0,0,.88) 0%, rgba(0,0,0,.48) 45%, rgba(0,0,0,.82) 100%);
    }

    iframe {
      width:100vw; height:56.25vw; min-height:100vh; min-width:177.77vh;
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    }

    .glass-panel { background:rgba(255,255,255,.05); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.14); }
    .title-clamp { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

    .control-btn { transition:all .2s; display:flex; align-items:center; justify-content:center; }
    .control-btn:hover { transform:scale(1.08); color:var(--gold); }
    .control-btn.active { color:var(--gold); text-shadow:0 0 10px rgba(251,191,36,.5); }

    .carousel-container {
      mask-image: linear-gradient(to right, transparent, black 7%, black 93%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 7%, black 93%, transparent);
      scrollbar-width:none;
    }
    .carousel-container::-webkit-scrollbar { display:none; }

    .song-card {
      min-width: 210px; cursor:pointer; opacity:.52; transform:scale(.95);
      transition:all .35s cubic-bezier(.4,0,.2,1);
    }
    .song-card:hover { opacity:.85; transform:scale(1); }
    .song-card.active {
      opacity:1; transform:scale(1.03); border-bottom:3px solid var(--gold);
      box-shadow:0 0 26px rgba(251,191,36,.24);
    }

    @media (max-width: 1024px) {
      body { overflow:auto; }
      main { min-height:100vh; }
      .title-clamp { -webkit-line-clamp:2; }
    }
  </style>
</head>
<body>
  <div class="video-background"><div id="player"></div></div>
  <div class="video-overlay"></div>

  <main class="relative h-screen flex flex-col justify-between p-5 md:p-10 z-10 gap-6">
    <nav class="flex justify-between items-center">
      <div class="text-xl font-bold tracking-tight flex items-center gap-2">
        <span class="text-yellow-400">●</span> YouRadio Pro
      </div>
      <a href="index.html" class="text-xs uppercase tracking-[0.2em] text-gray-200 hover:text-white transition">← Inicio</a>
    </nav>

    <section class="max-w-4xl w-full">
      <div class="flex items-center gap-2 text-yellow-400 mb-2">
        <div class="text-[10px]">★★★★★</div>
        <span id="genre-tag" class="text-[10px] uppercase tracking-widest text-gray-200 font-bold">Cargando género</span>
      </div>

      <h1 id="current-title" class="title-clamp text-5xl md:text-7xl font-extrabold leading-[.95] drop-shadow-2xl mb-2">Cargando...</h1>
      <p id="current-artist" class="text-xl md:text-2xl text-gray-200/90 font-light mb-6">Sincronizando con YouTube...</p>

      <div class="glass-panel rounded-2xl p-4 md:p-5 w-full max-w-3xl">
        <div class="mb-4">
          <div class="flex justify-between text-[11px] text-gray-200/80 mb-1 font-mono">
            <span id="curr-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
          <div id="progress-container" class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden cursor-pointer">
            <div id="progress-bar" class="h-full bg-yellow-400 w-0 transition-all"></div>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 md:gap-4">
          <button id="shuffle-btn" class="control-btn w-11 h-11 rounded-full glass-panel text-gray-200" title="Shuffle"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg></button>
          <button id="prev-btn" class="control-btn w-11 h-11 rounded-full glass-panel" title="Anterior"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4zM16.445 14.832A1 1 0 0018 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/></svg></button>
          <button id="seek-back-btn" class="control-btn w-11 h-11 rounded-full glass-panel" title="-10s"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" /></svg></button>

          <button id="play-btn" class="w-14 h-14 bg-yellow-400 text-black rounded-full flex items-center justify-center hover:bg-yellow-300 transition shadow-lg shadow-yellow-400/30"><span id="play-icon-svg"></span></button>

          <button id="seek-forward-btn" class="control-btn w-11 h-11 rounded-full glass-panel" title="+10s"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.599 7.2A1 1 0 005 8v8a1 1 0 001.599.8l5.334-4zM19.933 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.599.8l5.334-4z" /></svg></button>
          <button id="next-btn" class="control-btn w-11 h-11 rounded-full glass-panel" title="Siguiente"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4zM11.555 5.168A1 1 0 0010 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z"/></svg></button>
          <button id="mute-btn" class="control-btn w-11 h-11 rounded-full glass-panel" title="Mute"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a9 9 0 010 11.9M9 9L5 12l4 3V9zM12 5v14"/></svg></button>

          <div class="w-full md:w-auto md:ml-2 flex flex-wrap gap-2">
            <button id="download-video" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar video</button>
            <button id="download-audio" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar Musica</button>
            <button id="floating-window" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Ventana flotante</button>
          </div>
        </div>
      </div>
    </section>

    <section class="w-full">
      <h3 class="text-[11px] uppercase tracking-[0.35em] text-gray-200/80 font-bold mb-4 ml-1">Lista de reproducción</h3>
      <div id="carousel" class="flex gap-4 overflow-x-auto pb-4 carousel-container"></div>
    </section>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const fallbackPlaylist = [
      { id: 'tBMbAyqOLY8', title: 'MONEY', artist: 'LISA', genre: 'K-Pop / Hip-Hop', thumb: 'https://img.youtube.com/vi/tBMbAyqOLY8/mqdefault.jpg' },
      { id: 't6fVf8C01U0', title: 'Armageddon', artist: 'aespa', genre: 'Hyperpop / Dance', thumb: 'https://img.youtube.com/vi/t6fVf8C01U0/mqdefault.jpg' },
      { id: 'ncl0miz9l00', title: 'Whiplash', artist: 'aespa', genre: 'EDM / Pop', thumb: 'https://img.youtube.com/vi/ncl0miz9l00/mqdefault.jpg' },
      { id: 'v7bnOxLid98', title: 'ROCKSTAR', artist: 'LISA', genre: 'Pop / Rap', thumb: 'https://img.youtube.com/vi/v7bnOxLid98/mqdefault.jpg' },
      { id: 'gQlMMD8auMs', title: 'Shut Down', artist: 'BLACKPINK', genre: 'Classical / Trap', thumb: 'https://img.youtube.com/vi/gQlMMD8auMs/mqdefault.jpg' }
    ];

    const VIDEO_ID_REGEX = /^[\w-]{11}$/;
    let player;
    let playlist = [...fallbackPlaylist];
    let currentIndex = 0;
    let isShuffle = false;
    let isMuted = false;
    let timerInterval;
    let floatingWindowRef = null;
    let autoMixMode = true;

    const playIconEl = document.getElementById('play-icon-svg');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const currTimeEl = document.getElementById('curr-time');
    const totalTimeEl = document.getElementById('total-time');

    function normalizeVideoId(rawId) {
      if (!rawId) return null;
      const id = rawId.trim().slice(0, 11);
      return VIDEO_ID_REGEX.test(id) ? id : null;
    }

    function inferGenre(title = '') {
      const lower = title.toLowerCase();
      if (lower.includes('rock')) return 'Rock';
      if (lower.includes('dance')) return 'Dance';
      if (lower.includes('hip') || lower.includes('rap')) return 'Hip-Hop';
      if (lower.includes('k-pop') || lower.includes('aespa') || lower.includes('blackpink') || lower.includes('lisa')) return 'K-Pop';
      return 'Cinematic Pop';
    }

    async function enrichTrack(videoId) {
      const base = { id: videoId, title: `Track ${videoId}`, artist: 'YouTube', genre: 'Music', thumb: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` };
      try {
        const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
        if (!response.ok) return base;
        const data = await response.json();
        const title = (data.title || base.title).trim();
        const author = (data.author_name || 'YouTube').trim();
        return { id: videoId, title, artist: author, genre: inferGenre(title), thumb: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` };
      } catch { return base; }
    }

    function updateUI() {
      const track = playlist[currentIndex];
      if (!track) return;
      document.getElementById('current-title').innerText = track.title;
      document.getElementById('current-artist').innerText = track.artist;
      document.getElementById('genre-tag').innerText = track.genre;

      document.querySelectorAll('.song-card').forEach((card, idx) => {
        if (idx === currentIndex) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
          card.classList.remove('active');
        }
      });
    }

    function renderCarousel() {
      const container = document.getElementById('carousel');
      container.innerHTML = '';
      playlist.forEach((track, index) => {
        const card = document.createElement('div');
        card.className = `song-card relative rounded-xl overflow-hidden glass-panel ${index === currentIndex ? 'active' : ''}`;
        card.innerHTML = `
          <div class="h-24 overflow-hidden"><img src="${track.thumb}" class="w-full h-full object-cover" alt="${track.title}"></div>
          <div class="p-3 bg-black/40">
            <div class="text-[10px] text-yellow-400 font-bold mb-1">${String(index + 1).padStart(2, '0')}</div>
            <h4 class="text-xs font-bold truncate">${track.title}</h4>
            <p class="text-[9px] text-gray-300 truncate">${track.artist}</p>
          </div>`;
        card.addEventListener('click', () => playTrack(index));
        container.appendChild(card);
      });
    }

    function playTrack(index) {
      currentIndex = index;
      const track = playlist[currentIndex];
      if (!track || !player) return;
      if (autoMixMode && typeof player.playVideoAt === 'function') player.playVideoAt(currentIndex);
      else player.loadVideoById(track.id);
      updateUI();
    }

    function togglePlay() {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    }

    function updatePlayPauseIcon() {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        playIconEl.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>`;
      } else {
        playIconEl.innerHTML = `<svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
      }
    }

    function nextTrack() {
      if (isShuffle) {
        let next;
        do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex && playlist.length > 1);
        currentIndex = next;
      } else {
        currentIndex = (currentIndex + 1) % playlist.length;
      }
      playTrack(currentIndex);
    }

    function prevTrack() {
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      playTrack(currentIndex);
    }

    function seekRelative(seconds) {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const current = player.getCurrentTime();
      const duration = player.getDuration() || 0;
      player.seekTo(Math.max(0, Math.min(duration, current + seconds)), true);
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
    }

    function toggleMute() {
      if (!player) return;
      if (isMuted) player.unMute(); else player.mute();
      isMuted = !isMuted;
      document.getElementById('mute-btn').classList.toggle('active', isMuted);
    }

    function startProgressTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const current = player.getCurrentTime();
        const total = player.getDuration();
        if (total > 0) {
          progressBar.style.width = `${(current / total) * 100}%`;
          currTimeEl.innerText = formatTime(current);
          totalTimeEl.innerText = formatTime(total);
        }
      }, 500);
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function hydratePlaylistFromYouTube() {
      if (!player || typeof player.getPlaylist !== 'function') return;
      const ids = player.getPlaylist() || [];
      if (!ids.length) return;

      const enriched = [];
      for (const id of ids.slice(0, 20)) enriched.push(await enrichTrack(id));
      playlist = enriched;
      const ytIdx = player.getPlaylistIndex?.() ?? 0;
      currentIndex = Math.max(0, Math.min(ytIdx, playlist.length - 1));
      renderCarousel();
      updateUI();
    }

    function openDownload(kind) {
      const track = playlist[currentIndex];
      if (!track) return;
      const targetUrl = kind === 'audio'
        ? `https://v1.y2mate.nu/es/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${track.id}`)}`
        : `https://app.ytdown.to/es7/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${track.id}`)}`;
      window.open(targetUrl, '_blank', 'noopener,noreferrer');
    }

    function openFloatingWindow() {
      const track = playlist[currentIndex];
      if (!track) return;
      const popupUrl = `https://www.youtube.com/embed/${track.id}?autoplay=1&rel=0`;
      const features = 'popup=yes,width=460,height=820,menubar=no,toolbar=no,location=no,status=no';
      if (floatingWindowRef && !floatingWindowRef.closed) { floatingWindowRef.location.href = popupUrl; floatingWindowRef.focus(); }
      else { floatingWindowRef = window.open(popupUrl, 'youradio-floating', features); }
    }

    function loadAutoMixBySeed(seedId) {
      autoMixMode = true;
      player.loadPlaylist({ list: `RD${seedId}`, index: 0, startSeconds: 0, suggestedQuality: 'large' });
      setTimeout(hydratePlaylistFromYouTube, 1400);
    }

    async function onPlayerReady(event) {
      const seed = normalizeVideoId(new URLSearchParams(window.location.search).get('v'));
      if (seed) {
        const seedTrack = await enrichTrack(seed);
        playlist = [seedTrack];
        currentIndex = 0;
        renderCarousel();
        updateUI();
        loadAutoMixBySeed(seed);
      } else {
        autoMixMode = false;
        renderCarousel();
        updateUI();
        event.target.loadVideoById(playlist[currentIndex].id);
      }
      startProgressTimer();
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) nextTrack();
      if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.CUED) {
        const idx = player.getPlaylistIndex?.();
        if (Number.isInteger(idx) && idx >= 0 && idx < playlist.length) {
          currentIndex = idx;
          updateUI();
        }
      }
      updatePlayPauseIcon();
    }

    function onYouTubeIframeAPIReady() {
      const firstId = normalizeVideoId(new URLSearchParams(window.location.search).get('v')) || playlist[0].id;
      player = new YT.Player('player', {
        videoId: firstId,
        playerVars: { autoplay:1, controls:0, modestbranding:1, rel:0, disablekb:0, iv_load_policy:3, playsinline:1 },
        events: { onReady:onPlayerReady, onStateChange:onPlayerStateChange }
      });
    }

    document.getElementById('shuffle-btn').addEventListener('click', toggleShuffle);
    document.getElementById('prev-btn').addEventListener('click', prevTrack);
    document.getElementById('seek-back-btn').addEventListener('click', () => seekRelative(-10));
    document.getElementById('play-btn').addEventListener('click', togglePlay);
    document.getElementById('seek-forward-btn').addEventListener('click', () => seekRelative(10));
    document.getElementById('next-btn').addEventListener('click', nextTrack);
    document.getElementById('mute-btn').addEventListener('click', toggleMute);
    document.getElementById('download-video').addEventListener('click', () => openDownload('video'));
    document.getElementById('download-audio').addEventListener('click', () => openDownload('audio'));
    document.getElementById('floating-window').addEventListener('click', openFloatingWindow);

    progressContainer.addEventListener('click', (e) => {
      if (!player || typeof player.getDuration !== 'function') return;
      const rect = progressContainer.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      player.seekTo(pos * player.getDuration(), true);
    });

    window.addEventListener('beforeunload', () => {
      if (timerInterval) clearInterval(timerInterval);
      if (floatingWindowRef && !floatingWindowRef.closed) floatingWindowRef.close();
    });
  </script>
</body>
</html>
