<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouRadio Pro - Cinematic Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap');

    body {
      background-color: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.18), transparent 40%),
        linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.42) 50%, rgba(0,0,0,0.88) 100%);
      z-index: -1;
    }

    iframe {
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .carousel-container {
      mask-image: linear-gradient(to right, transparent, black 6%, black 94%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 6%, black 94%, transparent);
      scrollbar-width: none;
    }

    .carousel-container::-webkit-scrollbar { display: none; }

    .carousel-nav-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(12,12,12,.52);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: all .2s;
    }

    .carousel-nav-btn:hover {
      color: #fbbf24;
      border-color: rgba(251,191,36,.65);
      transform: translateY(-1px);
    }

    .song-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      min-width: 190px;
      max-width: 230px;
      opacity: 0.5;
      transform: scale(0.95);
    }

    .song-card:hover {
      opacity: 0.82;
      transform: scale(1);
    }

    .song-card.active {
      opacity: 1;
      transform: scale(1.05);
      border-bottom: 3px solid #fbbf24;
      box-shadow: 0 0 20px rgba(251,191,36,0.25);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .control-btn {
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #fbbf24;
    }

    .control-btn.active {
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
    }


    .page-shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 1.25rem;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .actions-row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: .7rem;
      justify-content: flex-end;
    }

    @media (max-width: 1024px) {
      .song-card { min-width: 172px; }
    }

    @media (max-width: 768px) {
      .carousel-nav-btn { width: 36px; height: 36px; }
      .song-card { min-width: 156px; max-width: 180px; }
      .controls-row { justify-content: center; }
      .actions-row { justify-content: center; }
    }

    @media (max-width: 640px) {
      main.page-shell {
        padding: 1rem 0.85rem 1.15rem;
      }

      #current-title {
        font-size: 1.75rem;
        line-height: 1.1;
      }

      #current-artist {
        font-size: .95rem;
        margin-bottom: 1rem;
      }

      .glass-panel {
        border-radius: 1rem;
      }

      .song-card { min-width: 142px; max-width: 165px; }
    }
  </style>
</head>
<body>
  <div class="video-background">
    <div id="player"></div>
  </div>
  <div class="video-overlay"></div>

  <main class="relative page-shell p-5 md:p-9 lg:p-12 z-10">
    <nav class="flex justify-between items-center">
      <div class="text-xl font-bold tracking-tighter flex items-center gap-2">
        <span class="text-yellow-400 animate-pulse">●</span> YouRadio Pro
      </div>
      <a href="index.html" class="text-xs uppercase tracking-widest text-gray-300 hover:text-white transition">← Inicio</a>
    </nav>

    <section class="w-full max-w-4xl">
      <div class="flex items-center gap-2 text-yellow-500 mb-2">
        <div class="flex text-[10px]">★★★★★</div>
        <span id="genre-tag" class="text-[10px] uppercase tracking-widest text-gray-300 ml-2 font-bold">CARGANDO GÉNERO</span>
      </div>

      <h1 id="current-title" class="text-3xl md:text-5xl font-extrabold mb-2 leading-tight tracking-tight text-white drop-shadow-[0_0_22px_rgba(251,191,36,0.32)]">Cargando...</h1>
      <p id="current-artist" class="text-lg md:text-xl text-gray-200 mb-6 font-light">Sincronizando con YouTube...</p>

      <div class="flex flex-col gap-6 glass-panel rounded-2xl p-4 md:p-5 w-full max-w-3xl">
        <div class="w-full group">
          <div class="flex justify-between text-[10px] text-gray-300 mb-1 font-mono">
            <span id="curr-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
          <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden cursor-pointer relative" id="progress-container">
            <div id="progress-bar" class="h-full bg-yellow-400 w-0 transition-all"></div>
          </div>
        </div>

        <div class="controls-row">
          <button id="shuffle-btn" class="control-btn text-gray-300" title="Modo Aleatorio">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
          </button>

          <button id="prev-btn" class="control-btn text-white" title="Anterior">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4zM16.445 14.832A1 1 0 0018 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z" /></svg>
          </button>

          <button id="seek-back-btn" class="control-btn text-gray-300" title="Retroceder 10s">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" /></svg>
          </button>

          <button id="play-btn" class="w-14 h-14 bg-yellow-400 text-black rounded-full flex items-center justify-center hover:bg-yellow-300 transition-all shadow-lg shadow-yellow-400/20">
            <span id="play-icon-svg"></span>
          </button>

          <button id="seek-forward-btn" class="control-btn text-gray-300" title="Adelantar 10s">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.599 7.2A1 1 0 005 8v8a1 1 0 001.599.8l5.334-4zM19.933 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.599.8l5.334-4z" /></svg>
          </button>

          <button id="next-btn" class="control-btn text-white" title="Siguiente">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4zM11.555 5.168A1 1 0 0010 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z" /></svg>
          </button>

          <button id="mute-btn" class="control-btn text-gray-300" title="Mute/Unmute">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a9 9 0 010 11.9M9 9L5 12l4 3V9zM12 5v14"/></svg>
          </button>

        </div>
      </div>
    </section>

    <section class="w-full">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-[10px] uppercase tracking-[0.3em] text-gray-300 font-bold ml-2">Lista de Reproducción</h3>
        <div class="flex items-center gap-2">
          <button id="carousel-left" class="carousel-nav-btn" type="button" title="Mover a la izquierda">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button id="carousel-right" class="carousel-nav-btn" type="button" title="Mover a la derecha">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div id="carousel" class="flex gap-4 overflow-x-auto pb-4 carousel-container"></div>
    </section>
    <div class="actions-row mt-1">
      <button id="download-video" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar video</button>
      <button id="download-audio" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar Musica</button>
      <button id="floating-window" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Ventana flotante</button>
    </div>

  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const basePlaylist = [
      { id: 'tBMbAyqOLY8', title: 'MONEY', artist: 'LISA', genre: 'K-Pop / Hip-Hop', thumb: 'https://img.youtube.com/vi/tBMbAyqOLY8/mqdefault.jpg' },
      { id: 't6fVf8C01U0', title: 'Armageddon', artist: 'aespa', genre: 'Hyperpop / Dance', thumb: 'https://img.youtube.com/vi/t6fVf8C01U0/mqdefault.jpg' },
      { id: 'ncl0miz9l00', title: 'Whiplash', artist: 'aespa', genre: 'EDM / Pop', thumb: 'https://img.youtube.com/vi/ncl0miz9l00/mqdefault.jpg' },
      { id: 'v7bnOxLid98', title: 'ROCKSTAR', artist: 'LISA', genre: 'Pop / Rap', thumb: 'https://img.youtube.com/vi/v7bnOxLid98/mqdefault.jpg' },
      { id: 'gQlMMD8auMs', title: 'Shut Down', artist: 'BLACKPINK', genre: 'Classical / Trap', thumb: 'https://img.youtube.com/vi/gQlMMD8auMs/mqdefault.jpg' }
    ];

    const VIDEO_ID_REGEX = /^[\w-]{11}$/;
    let playlist = [...basePlaylist];
    let player;
    let currentIndex = 0;
    let isShuffle = false;
    let isMuted = false;
    let timerInterval;
    let floatingWindowRef;
    let isHydratingAutoMix = false;
    let seedVideoId = null;
    let cachedAutoMixIds = [];
    let isExpandingUnique = false;
    const MIN_PLAYLIST_TARGET = 220;
    const EXTEND_CHUNK_SIZE = 40;

    function normalizeVideoId(rawId) {
      if (!rawId) return null;
      const id = rawId.trim().slice(0, 11);
      return VIDEO_ID_REGEX.test(id) ? id : null;
    }


    function dedupePlaylist(preferredSeedId = seedVideoId) {
      const unique = [];
      const seen = new Set();
      for (const track of playlist) {
        const id = normalizeVideoId(track?.id || '');
        if (!id || seen.has(id)) continue;
        seen.add(id);
        unique.push({
          id,
          title: track.title || `YouTube ${id}`,
          artist: track.artist || 'YouTube',
          genre: track.genre || 'AutoMix',
          thumb: track.thumb || `https://img.youtube.com/vi/${id}/mqdefault.jpg`
        });
      }
      if (preferredSeedId) {
        const seedIdx = unique.findIndex((t) => t.id === preferredSeedId);
        if (seedIdx > 0) {
          const [seedTrack] = unique.splice(seedIdx, 1);
          unique.unshift(seedTrack);
        }
      }
      playlist = unique;
      if (currentIndex >= playlist.length) currentIndex = Math.max(0, playlist.length - 1);
    }

    async function autoExtendPlaylist(minTarget = MIN_PLAYLIST_TARGET, force = false) {
      if (isExpandingUnique || (isHydratingAutoMix && !force)) return;
      const seedId = seedVideoId || playlist[0]?.id;
      if (!seedId) return;

      dedupePlaylist(seedId);
      if (playlist.length >= minTarget) return;

      isExpandingUnique = true;
      try {
        const seen = new Set(playlist.map((t) => t.id));
        const discovered = [];
        const queue = [seedId, ...cachedAutoMixIds.filter((id) => !seen.has(id))];
        const visited = new Set();

        while (queue.length && seen.size < minTarget && visited.size < 120) {
          const source = queue.shift();
          if (!source || visited.has(source)) continue;
          visited.add(source);
          const related = await fetchRelatedIdsFromSeed(source);
          for (const id of related) {
            if (!id || seen.has(id)) continue;
            seen.add(id);
            discovered.push(id);
            if (queue.length < 200) queue.push(id);
            if (seen.size >= minTarget) break;
          }
        }

        if (seen.size < minTarget) {
          const seedTrack = playlist.find((t) => t.id === seedId) || {};
          const q = `${seedTrack.title || ''} ${seedTrack.artist || ''}`.trim() || `${seedId} music`;
          const searched = await fetchSeedSearchIds(q, minTarget * 2);
          for (const id of searched) {
            if (!id || seen.has(id) || id === seedId) continue;
            seen.add(id);
            discovered.push(id);
            if (seen.size >= minTarget) break;
          }
        }

        if (discovered.length) {
          const extra = discovered.map((id, i) => ({
            id,
            title: `Recomendación ${playlist.length + i + 1}`,
            artist: 'YouTube',
            genre: 'AutoMix',
            thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`
          }));
          playlist.push(...extra);
          dedupePlaylist(seedId);
          renderCarousel();
          updateUI();

          // hidrata metadatos solo para un bloque inicial para evitar espera larga
          const hydrateIds = playlist.slice(1, 41).map((t) => t.id);
          const metas = await Promise.all(hydrateIds.map((id) => fetchTrackMeta(id, 1700)));
          hydrateIds.forEach((id, idx) => {
            const pos = playlist.findIndex((t) => t.id === id);
            if (pos > -1) {
              playlist[pos] = { ...playlist[pos], ...metas[idx] };
            }
          });
          renderCarousel();
          updateUI();
        }
      } finally {
        isExpandingUnique = false;
      }
    }

    function maybeExtendNearEnd() {
      if (isHydratingAutoMix || isExpandingUnique) return;
      if (playlist.length - currentIndex <= 25 || playlist.length < MIN_PLAYLIST_TARGET) {
        autoExtendPlaylist(Math.max(MIN_PLAYLIST_TARGET, playlist.length + EXTEND_CHUNK_SIZE));
      }
    }

    function inferGenre(title = "") {
      const t = title.toLowerCase();
      if (/rock|metal|guitar/.test(t)) return "Rock";
      if (/rap|hip hop|hip-hop|trap/.test(t)) return "Hip-Hop";
      if (/edm|dance|remix|house|techno/.test(t)) return "EDM / Dance";
      if (/k-pop|aespa|blackpink|lisa|bts/.test(t)) return "K-Pop";
      if (/acoustic|piano|ballad/.test(t)) return "Ballad";
      if (/reggaeton|latin/.test(t)) return "Latin";
      return "Pop";
    }

    async function fetchTrackMeta(id, timeoutMs = 1800) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`, { signal: controller.signal });
        const data = res.ok ? await res.json() : {};
        const title = (data.title || `YouTube ${id}`).trim();
        const artist = (data.author_name || 'YouTube').trim();
        return { title, artist, genre: inferGenre(title) };
      } catch {
        return { title: `YouTube ${id}`, artist: 'YouTube', genre: 'AutoMix' };
      } finally {
        clearTimeout(timeout);
      }
    }

    async function fetchRelatedIdsFromSeed(seedId) {
      if (!seedId) return [];
      const ids = [];
      const pushId = (value) => {
        const id = normalizeVideoId(value || '');
        if (id && id !== seedId && !ids.includes(id)) ids.push(id);
      };

      try {
        const res = await fetch(`https://r.jina.ai/http://www.youtube.com/watch?v=${seedId}`);
        const text = await res.text();
        const re = /watch\?v=([\w-]{11})/g;
        let m;
        while ((m = re.exec(text)) !== null && ids.length < 40) pushId(m[1]);
      } catch {}

      if (ids.length < 20) {
        try {
          const res = await fetch(`https://inv.nadeko.net/api/v1/videos/${seedId}`);
          const data = res.ok ? await res.json() : {};
          const related = Array.isArray(data.recommendedVideos) ? data.recommendedVideos : [];
          related.forEach((item) => pushId(item?.videoId || item?.video_id));
        } catch {}
      }

      return ids;
    }

    async function fetchSeedSearchIds(query, limit = 240) {
      if (!query) return [];
      const ids = [];
      const pushId = (value) => {
        const id = normalizeVideoId(value || '');
        if (id && !ids.includes(id)) ids.push(id);
      };

      let pageToken = '';
      try {
        for (let page = 0; page < 5 && ids.length < limit; page += 1) {
          const tokenParam = pageToken ? `&pageToken=${encodeURIComponent(pageToken)}` : '';
          const url = `https://yt.lemnoslife.com/noKey/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(query)}${tokenParam}`;
          const res = await fetch(url);
          if (!res.ok) break;
          const data = await res.json();
          const items = Array.isArray(data.items) ? data.items : [];
          items.forEach((item) => pushId(item?.id?.videoId || item?.id));
          if (!data.nextPageToken) break;
          pageToken = data.nextPageToken;
        }
      } catch {}

      return ids.slice(0, limit);
    }

    async function collectAutoMixIds(seedId, target = 120) {
      const seen = new Set([seedId]);
      const ids = [];
      for (let i = 0; i < 24 && ids.length < target; i += 1) {
        const current = player.getPlaylist?.() || [];
        current.forEach((id) => {
          const normalized = normalizeVideoId(id || '');
          if (normalized && !seen.has(normalized)) {
            seen.add(normalized);
            ids.push(normalized);
          }
        });
        if (ids.length >= target) break;
        await new Promise((resolve) => setTimeout(resolve, 350));
      }
      return ids;
    }

    function updateUI() {
      const track = playlist[currentIndex] || playlist[0];
      if (!track) return;
      document.getElementById('current-title').innerText = track.title;
      document.getElementById('current-artist').innerText = track.artist;
      document.getElementById('genre-tag').innerText = track.genre;

      document.querySelectorAll('.song-card').forEach((card, idx) => {
        if (idx === currentIndex) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
          card.classList.remove('active');
        }
      });
    }

    function renderCarousel() {
      const container = document.getElementById('carousel');
      container.innerHTML = '';
      playlist.forEach((track, index) => {
        const card = document.createElement('div');
        card.className = `song-card relative rounded-xl overflow-hidden glass-panel ${index === currentIndex ? 'active' : ''}`;
        card.innerHTML = `
          <div class="h-24 overflow-hidden"><img src="${track.thumb}" class="w-full h-full object-cover"></div>
          <div class="p-3 bg-black/40">
            <div class="text-[10px] text-yellow-400 font-bold mb-1">${String(index+1).padStart(2,'0')}</div>
            <h4 class="text-xs font-bold truncate">${track.title}</h4>
            <p class="text-[9px] text-gray-300 truncate">${track.artist}</p>
          </div>`;
        card.onclick = () => playTrack(index);
        container.appendChild(card);
      });
    }

    function playTrack(index) {
      if (!playlist[index]) return;
      currentIndex = index;
      player.loadVideoById(playlist[currentIndex].id);
      setTimeout(() => {
        if (player && typeof player.playVideo === 'function') player.playVideo();
      }, 120);
      updateUI();
      maybeExtendNearEnd();
    }

    function togglePlay() {
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    }

    function updatePlayPauseIcon() {
      const state = player.getPlayerState();
      const icon = document.getElementById('play-icon-svg');
      if (state === YT.PlayerState.PLAYING) {
        icon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>`;
      } else {
        icon.innerHTML = `<svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
      }
    }

    function nextTrack() {
      if (isShuffle) {
        let next;
        do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex && playlist.length > 1);
        currentIndex = next;
      } else {
        currentIndex = (currentIndex + 1) % playlist.length;
      }
      playTrack(currentIndex);
    }

    function prevTrack() {
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      playTrack(currentIndex);
    }

    function seekRelative(seconds) {
      const current = player.getCurrentTime();
      const duration = player.getDuration() || 0;
      player.seekTo(Math.max(0, Math.min(duration, current + seconds)), true);
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
    }

    function toggleMute() {
      if (isMuted) player.unMute(); else player.mute();
      isMuted = !isMuted;
      document.getElementById('mute-btn').classList.toggle('active', isMuted);
    }

    function startProgressTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!player || !player.getCurrentTime) return;
        const current = player.getCurrentTime();
        const total = player.getDuration();
        if (total > 0) {
          document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;
          document.getElementById('curr-time').innerText = formatTime(current);
          document.getElementById('total-time').innerText = formatTime(total);
        }
      }, 500);
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function hydrateFromAutoMix(retry = 0) {
      if (!player || typeof player.getPlaylist !== 'function') return;
      const ids = player.getPlaylist() || [];

      if (!ids.length && retry < 8) {
        setTimeout(() => hydrateFromAutoMix(retry + 1), 500);
        return;
      }

      isHydratingAutoMix = true;
      try {
        const seedId = seedVideoId;
        let sourceIds = ids.map((id) => normalizeVideoId(id || '')).filter(Boolean);
        if (!sourceIds.length) sourceIds = [...cachedAutoMixIds];
        if (!sourceIds.length && seedId) sourceIds = await fetchRelatedIdsFromSeed(seedId);
        if (!sourceIds.length && seedId) {
          const seedTrack = playlist.find((t) => t.id === seedId) || {};
          sourceIds = await fetchSeedSearchIds(`${seedTrack.title || ''} ${seedTrack.artist || ''}`.trim() || `${seedId} music`, MIN_PLAYLIST_TARGET * 2);
        }

        const uniqueIds = [];
        const seen = new Set();
        if (seedId) {
          seen.add(seedId);
          uniqueIds.push(seedId);
        }
        sourceIds.forEach((id) => {
          const normalized = normalizeVideoId(id || '');
          if (normalized && !seen.has(normalized)) {
            seen.add(normalized);
            uniqueIds.push(normalized);
          }
        });

        if (uniqueIds.length < MIN_PLAYLIST_TARGET && seedId) {
          cachedAutoMixIds = uniqueIds.slice(1);
          await autoExtendPlaylist(MIN_PLAYLIST_TARGET, true);
          dedupePlaylist(seedId);
          renderCarousel();
          updateUI();
          return;
        }

        // Render rápido con placeholders para evitar lista vacía
        const quick = uniqueIds.slice(0, Math.max(MIN_PLAYLIST_TARGET, 240)).map((id, idx) => ({
          id,
          title: idx === 0 ? (playlist[0]?.title || `YouTube ${id}`) : `Recomendación ${idx + 1}`,
          artist: idx === 0 ? (playlist[0]?.artist || 'YouTube') : 'YouTube',
          genre: idx === 0 ? (playlist[0]?.genre || 'AutoMix') : 'AutoMix',
          thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`
        }));
        playlist = quick;
        currentIndex = 0;
        dedupePlaylist(seedId);
        renderCarousel();
        updateUI();

        const hydrateIds = playlist.slice(1, 51).map((t) => t.id);
        const metas = await Promise.all(hydrateIds.map((id) => fetchTrackMeta(id, 1700)));
        hydrateIds.forEach((id, idx) => {
          const pos = playlist.findIndex((t) => t.id === id);
          if (pos > -1) playlist[pos] = { ...playlist[pos], ...metas[idx] };
        });
        renderCarousel();
        updateUI();
      } finally {
        isHydratingAutoMix = false;
      }
    }

    async function startFromSeed(seedId, event) {
      if (!seedId) {
        renderCarousel();
        updateUI();
        if (event?.target) event.target.playVideo();
        return;
      }

      seedVideoId = seedId;
      const meta = await fetchTrackMeta(seedId, 1600);
      const seedTrack = {
        id: seedId,
        title: meta.title,
        artist: meta.artist,
        genre: meta.genre,
        thumb: `https://img.youtube.com/vi/${seedId}/mqdefault.jpg`
      };

      playlist = [seedTrack];
      currentIndex = 0;
      renderCarousel();
      updateUI();

      isHydratingAutoMix = true;
      cachedAutoMixIds = [];
      player.loadPlaylist({ list: `RD${seedId}`, index: 0, startSeconds: 0, suggestedQuality: 'large' });

      // Recolecta rápido IDs de AutoMix + búsquedas relacionadas al seed.
      const autoMixPromise = collectAutoMixIds(seedId, 120);
      const seedQuery = `${seedTrack.title} ${seedTrack.artist}`.trim();
      const relatedPromise = fetchRelatedIdsFromSeed(seedId);
      const searchPromise = fetchSeedSearchIds(seedQuery || `${seedId} music`, 220);

      const [autoIds, relatedIds, searchIds] = await Promise.all([autoMixPromise, relatedPromise, searchPromise]);
      const merged = [];
      const seen = new Set([seedId]);
      for (const id of [...autoIds, ...relatedIds, ...searchIds]) {
        const normalized = normalizeVideoId(id || '');
        if (normalized && !seen.has(normalized)) {
          seen.add(normalized);
          merged.push(normalized);
        }
      }
      cachedAutoMixIds = merged;

      // Mantener contexto RD<seed>: no usar loadVideoById aquí para no romper
      // la playlist interna que YouTube crea con recomendaciones.
      currentIndex = 0;
      updateUI();
      hydrateFromAutoMix(0);
    }

    function openDownload(kind) {
      const id = playlist[currentIndex].id;
      const target = kind === 'audio'
        ? `https://v1.y2mate.nu/es/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${id}`)}`
        : `https://app.ytdown.to/es7/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${id}`)}`;
      window.open(target, '_blank', 'noopener,noreferrer');
    }

    function openFloatingWindow() {
      const id = playlist[currentIndex].id;
      const popupUrl = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      const features = 'popup=yes,width=460,height=820,menubar=no,toolbar=no,location=no,status=no';
      if (floatingWindowRef && !floatingWindowRef.closed) { floatingWindowRef.location.href = popupUrl; floatingWindowRef.focus(); }
      else floatingWindowRef = window.open(popupUrl, 'youradio-floating', features);
    }

    function onPlayerReady(event) {
      startProgressTimer();

      const queryId = normalizeVideoId(new URLSearchParams(window.location.search).get('v'));
      if (queryId) startFromSeed(queryId, event);
      else {
        autoExtendPlaylist();
        renderCarousel();
        updateUI();
        event.target.playVideo();
      }
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        nextTrack();
        setTimeout(() => {
          const state = player?.getPlayerState?.();
          if (state !== YT.PlayerState.PLAYING) player?.playVideo?.();
        }, 260);
      }
      if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.CUED) {
        const currentVideoId = normalizeVideoId(player.getVideoData?.().video_id || '');
        const idx = currentVideoId ? playlist.findIndex((track) => track.id === currentVideoId) : -1;
        if (idx >= 0 && idx !== currentIndex) currentIndex = idx;
        updateUI();
        maybeExtendNearEnd();
      }
      updatePlayPauseIcon();
    }

    function onYouTubeIframeAPIReady() {
      const queryId = normalizeVideoId(new URLSearchParams(window.location.search).get('v'));
      const initialId = queryId || playlist[0].id;
      player = new YT.Player('player', {
        videoId: initialId,
        playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0, disablekb: 0, iv_load_policy: 3, playsinline: 1 },
        events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange }
      });
    }

    document.getElementById('shuffle-btn').addEventListener('click', toggleShuffle);
    document.getElementById('prev-btn').addEventListener('click', prevTrack);
    document.getElementById('seek-back-btn').addEventListener('click', () => seekRelative(-10));
    document.getElementById('play-btn').addEventListener('click', togglePlay);
    document.getElementById('seek-forward-btn').addEventListener('click', () => seekRelative(10));
    document.getElementById('next-btn').addEventListener('click', nextTrack);
    document.getElementById('mute-btn').addEventListener('click', toggleMute);
    document.getElementById('download-video').addEventListener('click', () => openDownload('video'));
    document.getElementById('download-audio').addEventListener('click', () => openDownload('audio'));
    document.getElementById('floating-window').addEventListener('click', openFloatingWindow);

    const carouselEl = document.getElementById('carousel');
    const carouselLeftBtn = document.getElementById('carousel-left');
    const carouselRightBtn = document.getElementById('carousel-right');

    carouselLeftBtn.addEventListener('click', () => {
      carouselEl.scrollBy({ left: -360, behavior: 'smooth' });
    });

    carouselRightBtn.addEventListener('click', () => {
      carouselEl.scrollBy({ left: 360, behavior: 'smooth' });
    });

    document.getElementById('progress-container').addEventListener('click', function (e) {
      const rect = this.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      player.seekTo(pos * player.getDuration(), true);
    });

    window.addEventListener('pageshow', (event) => {
      if (event.persisted) window.location.reload();
    });

    window.addEventListener('beforeunload', () => {
      if (timerInterval) clearInterval(timerInterval);
      if (floatingWindowRef && !floatingWindowRef.closed) floatingWindowRef.close();
    });
  </script>
</body>
</html>
