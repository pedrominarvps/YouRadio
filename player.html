
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouRadio Pro - Cinematic Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap');

    body {
      background-color: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
    }

    .video-background {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(251,191,36,0.18), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.09), transparent 40%),
        linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.38) 50%, rgba(0,0,0,0.88) 100%);
      z-index: -1;
    }

    iframe {
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .carousel-container {
      mask-image: linear-gradient(to right, transparent, black 6%, black 94%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 6%, black 94%, transparent);
      scrollbar-width: none;
    }

    .carousel-container::-webkit-scrollbar { display: none; }

    .song-card {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      min-width: 200px;
      opacity: 0.55;
      transform: scale(0.95);
    }

    .song-card:hover {
      opacity: 0.85;
      transform: scale(1);
    }

    .song-card.active {
      opacity: 1;
      transform: scale(1.04);
      border-bottom: 3px solid #fbbf24;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.22);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .control-btn {
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      transform: scale(1.1);
      color: #fbbf24;
    }

    .control-btn.active {
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251,191,36,.5);
    }
  </style>
</head>
<body>
  <div class="video-background">
    <div id="player"></div>
  </div>
  <div class="video-overlay"></div>

  <main class="relative h-screen flex flex-col justify-between p-6 md:p-12 z-10">
    <nav class="flex justify-between items-center">
      <div class="text-xl font-bold tracking-tighter flex items-center gap-2">
        <span class="text-yellow-400">●</span> YouRadio Pro
      </div>
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-xs uppercase tracking-widest text-gray-300 hover:text-white transition">← Inicio</a>
      </div>
    </nav>

    <div class="max-w-4xl">
      <div class="flex items-center gap-2 text-yellow-500 mb-2">
        <div class="flex text-[10px]">★★★★★</div>
        <span id="genre-tag" class="text-[10px] uppercase tracking-widest text-gray-300 ml-2 font-bold">Cargando género</span>
      </div>

      <h1 id="current-title" class="text-5xl md:text-7xl font-extrabold mb-2 leading-tight drop-shadow-xl">Cargando...</h1>
      <p id="current-artist" class="text-lg md:text-2xl text-gray-200 mb-6 font-light">Sincronizando con YouTube...</p>

      <div class="flex flex-col gap-6">
        <div class="w-full max-w-2xl group glass-panel rounded-xl p-3">
          <div class="flex justify-between text-[10px] text-gray-300 mb-1 font-mono">
            <span id="curr-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
          <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden cursor-pointer relative" id="progress-container">
            <div id="progress-bar" class="h-full bg-yellow-400 w-0 transition-all"></div>
          </div>
        </div>

        <div class="flex items-center gap-5 flex-wrap">
          <button id="shuffle-btn" class="control-btn text-gray-300" title="Modo Aleatorio">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
          </button>

          <button id="prev-btn" class="control-btn text-white" title="Anterior">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4zM16.445 14.832A1 1 0 0018 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z" /></svg>
          </button>

          <button id="seek-back-btn" class="control-btn text-gray-300" title="Retroceder 10s">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" /></svg>
          </button>

          <button id="play-btn" class="w-14 h-14 bg-yellow-400 text-black rounded-full flex items-center justify-center hover:bg-yellow-300 transition-all shadow-lg shadow-yellow-400/30">
            <span id="play-icon-svg"></span>
          </button>

          <button id="seek-forward-btn" class="control-btn text-gray-300" title="Adelantar 10s">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.599 7.2A1 1 0 005 8v8a1 1 0 001.599.8l5.334-4zM19.933 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.599.8l5.334-4z" /></svg>
          </button>

          <button id="next-btn" class="control-btn text-white" title="Siguiente">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4zM11.555 5.168A1 1 0 0010 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z" /></svg>
          </button>

          <button id="mute-btn" class="control-btn text-gray-300" title="Mute / Unmute">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a9 9 0 010 11.9M9 9L5 12l4 3V9zM12 5v14"/></svg>
          </button>

          <button id="download-video" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar video</button>
          <button id="download-audio" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Descargar Musica</button>
          <button id="floating-window" class="px-3 py-2 rounded-lg glass-panel text-sm hover:text-yellow-300 transition">Ventana flotante</button>
        </div>
      </div>
    </div>

    <div class="w-full">
      <h3 class="text-[10px] uppercase tracking-[0.3em] text-gray-300 font-bold mb-4 ml-2">Lista de Reproducción</h3>
      <div id="carousel" class="flex gap-4 overflow-x-auto pb-4 carousel-container"></div>
    </div>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const fallbackPlaylist = [
      { id: 'tBMbAyqOLY8', title: 'MONEY', artist: 'LISA', genre: 'K-Pop / Hip-Hop', thumb: 'https://img.youtube.com/vi/tBMbAyqOLY8/mqdefault.jpg' },
      { id: 't6fVf8C01U0', title: 'Armageddon', artist: 'aespa', genre: 'Hyperpop / Dance', thumb: 'https://img.youtube.com/vi/t6fVf8C01U0/mqdefault.jpg' },
      { id: 'ncl0miz9l00', title: 'Whiplash', artist: 'aespa', genre: 'EDM / Pop', thumb: 'https://img.youtube.com/vi/ncl0miz9l00/mqdefault.jpg' },
      { id: 'v7bnOxLid98', title: 'ROCKSTAR', artist: 'LISA', genre: 'Pop / Rap', thumb: 'https://img.youtube.com/vi/v7bnOxLid98/mqdefault.jpg' },
      { id: 'gQlMMD8auMs', title: 'Shut Down', artist: 'BLACKPINK', genre: 'Classical / Trap', thumb: 'https://img.youtube.com/vi/gQlMMD8auMs/mqdefault.jpg' }
    ];

    const VIDEO_ID_REGEX = /^[\w-]{11}$/;
    let player;
    let playlist = [...fallbackPlaylist];
    let currentIndex = 0;
    let isShuffle = false;
    let isMuted = false;
    let timerInterval;
    let floatingWindowRef = null;
    let autoMixMode = true;

    const playIconEl = document.getElementById('play-icon-svg');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const currTimeEl = document.getElementById('curr-time');
    const totalTimeEl = document.getElementById('total-time');

    function normalizeVideoId(rawId) {
      if (!rawId) return null;
      const id = rawId.trim().slice(0, 11);
      return VIDEO_ID_REGEX.test(id) ? id : null;
    }

    function inferGenre(title = '') {
      const lower = title.toLowerCase();
      if (lower.includes('rock')) return 'Rock';
      if (lower.includes('dance')) return 'Dance';
      if (lower.includes('hip') || lower.includes('rap')) return 'Hip-Hop';
      if (lower.includes('k-pop') || lower.includes('aespa') || lower.includes('blackpink') || lower.includes('lisa')) return 'K-Pop';
      return 'Cinematic Pop';
    }

    async function enrichTrack(videoId) {
      const base = {
        id: videoId,
        title: `Track ${videoId}`,
        artist: 'YouTube',
        genre: 'Music',
        thumb: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`
      };

      try {
        const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
        if (!response.ok) return base;
        const data = await response.json();
        const title = (data.title || base.title).trim();
        const author = (data.author_name || 'YouTube').trim();
        return {
          id: videoId,
          title,
          artist: author,
          genre: inferGenre(title),
          thumb: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`
        };
      } catch {
        return base;
      }
    }

    function extractVideoId(url) {
      try {
        const parsed = new URL(url.trim());
        const hostname = parsed.hostname.replace('www.', '');

        if (hostname === 'youtu.be') return normalizeVideoId(parsed.pathname.split('/').filter(Boolean)[0]);

        if (hostname === 'youtube.com' || hostname === 'm.youtube.com') {
          const directId = normalizeVideoId(parsed.searchParams.get('v'));
          if (directId) return directId;

          const parts = parsed.pathname.split('/').filter(Boolean);
          const shortsIndex = parts.indexOf('shorts');
          if (shortsIndex !== -1 && parts[shortsIndex + 1]) return normalizeVideoId(parts[shortsIndex + 1]);

          const embedIndex = parts.indexOf('embed');
          if (embedIndex !== -1 && parts[embedIndex + 1]) return normalizeVideoId(parts[embedIndex + 1]);
        }
      } catch {
        return null;
      }
      return null;
    }

    function updateUI() {
      const track = playlist[currentIndex];
      if (!track) return;

      document.getElementById('current-title').innerText = track.title;
      document.getElementById('current-artist').innerText = track.artist;
      document.getElementById('genre-tag').innerText = track.genre;

      document.querySelectorAll('.song-card').forEach((card, idx) => {
        if (idx === currentIndex) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
          card.classList.remove('active');
        }
      });
    }

    function renderCarousel() {
      const container = document.getElementById('carousel');
      container.innerHTML = '';

      playlist.forEach((track, index) => {
        const card = document.createElement('div');
        card.className = `song-card relative rounded-xl overflow-hidden glass-panel ${index === currentIndex ? 'active' : ''}`;
        card.innerHTML = `
          <div class="h-24 overflow-hidden"><img src="${track.thumb}" class="w-full h-full object-cover" alt="${track.title}"></div>
          <div class="p-3 bg-black/40">
            <div class="text-[10px] text-yellow-400 font-bold mb-1">${String(index + 1).padStart(2, '0')}</div>
            <h4 class="text-xs font-bold truncate">${track.title}</h4>
            <p class="text-[9px] text-gray-300 truncate">${track.artist}</p>
          </div>
        `;
        card.addEventListener('click', () => playTrack(index));
        container.appendChild(card);
      });
    }

    function playTrack(index) {
      currentIndex = index;
      const track = playlist[currentIndex];
      if (!track || !player) return;

      if (autoMixMode && typeof player.playVideoAt === 'function') {
        player.playVideoAt(currentIndex);
      } else {
        player.loadVideoById(track.id);
      }

      updateUI();
    }

    function togglePlay() {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    }

    function updatePlayPauseIcon() {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        playIconEl.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>`;
      } else {
        playIconEl.innerHTML = `<svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
      }
    }

    function nextTrack() {
      if (isShuffle) {
        let next;
        do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex && playlist.length > 1);
        currentIndex = next;
      } else {
        currentIndex = (currentIndex + 1) % playlist.length;
      }
      playTrack(currentIndex);
    }

    function prevTrack() {
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      playTrack(currentIndex);
    }

    function seekRelative(seconds) {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const current = player.getCurrentTime();
      const duration = player.getDuration() || 0;
      const target = Math.max(0, Math.min(duration, current + seconds));
      player.seekTo(target, true);
    }

    function toggleShuffle() {
      isShuffle = !isShuffle;
      document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
    }

    function toggleMute() {
      if (!player) return;
      if (isMuted) player.unMute();
      else player.mute();
      isMuted = !isMuted;
      document.getElementById('mute-btn').classList.toggle('active', isMuted);
    }

    function startProgressTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        const current = player.getCurrentTime();
        const total = player.getDuration();
        if (total > 0) {
          const pct = (current / total) * 100;
          progressBar.style.width = `${pct}%`;
          currTimeEl.innerText = formatTime(current);
          totalTimeEl.innerText = formatTime(total);
        }
      }, 500);
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function hydratePlaylistFromYouTube() {
      if (!player || typeof player.getPlaylist !== 'function') return;
      const ids = player.getPlaylist() || [];
      if (!ids.length) return;

      const enriched = [];
      for (const id of ids.slice(0, 20)) {
        enriched.push(await enrichTrack(id));
      }

      playlist = enriched;
      const ytIdx = player.getPlaylistIndex?.() ?? 0;
      currentIndex = Math.max(0, Math.min(ytIdx, playlist.length - 1));
      renderCarousel();
      updateUI();
    }

    function openDownload(kind) {
      const track = playlist[currentIndex];
      if (!track) return;
      const targetUrl = kind === 'audio'
        ? `https://v1.y2mate.nu/es/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${track.id}`)}`
        : `https://app.ytdown.to/es7/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${track.id}`)}`;
      window.open(targetUrl, '_blank', 'noopener,noreferrer');
    }

    function openFloatingWindow() {
      const track = playlist[currentIndex];
      if (!track) return;
      const popupUrl = `https://www.youtube.com/embed/${track.id}?autoplay=1&rel=0`;
      const features = 'popup=yes,width=460,height=820,menubar=no,toolbar=no,location=no,status=no';
      if (floatingWindowRef && !floatingWindowRef.closed) {
        floatingWindowRef.location.href = popupUrl;
        floatingWindowRef.focus();
      } else {
        floatingWindowRef = window.open(popupUrl, 'youradio-floating', features);
      }
    }

    function loadAutoMixBySeed(seedId) {
      autoMixMode = true;
      player.loadPlaylist({ list: `RD${seedId}`, index: 0, startSeconds: 0, suggestedQuality: 'large' });
      setTimeout(hydratePlaylistFromYouTube, 1400);
    }

    async function onPlayerReady(event) {
      const params = new URLSearchParams(window.location.search);
      const seed = normalizeVideoId(params.get('v'));

      if (seed) {
        const seedTrack = await enrichTrack(seed);
        playlist = [seedTrack];
        currentIndex = 0;
        renderCarousel();
        updateUI();
        loadAutoMixBySeed(seed);
      } else {
        autoMixMode = false;
        renderCarousel();
        updateUI();
        event.target.loadVideoById(playlist[currentIndex].id);
      }

      startProgressTimer();
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) nextTrack();
      if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.CUED) {
        const idx = player.getPlaylistIndex?.();
        if (Number.isInteger(idx) && idx >= 0 && idx < playlist.length) {
          currentIndex = idx;
          updateUI();
        }
      }
      updatePlayPauseIcon();
    }

    function onYouTubeIframeAPIReady() {
      const firstId = normalizeVideoId(new URLSearchParams(window.location.search).get('v')) || playlist[0].id;
      player = new YT.Player('player', {
        videoId: firstId,
        playerVars: {
          autoplay: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          disablekb: 0,
          iv_load_policy: 3,
          playsinline: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    document.getElementById('shuffle-btn').addEventListener('click', toggleShuffle);
    document.getElementById('prev-btn').addEventListener('click', prevTrack);
    document.getElementById('seek-back-btn').addEventListener('click', () => seekRelative(-10));
    document.getElementById('play-btn').addEventListener('click', togglePlay);
    document.getElementById('seek-forward-btn').addEventListener('click', () => seekRelative(10));
    document.getElementById('next-btn').addEventListener('click', nextTrack);
    document.getElementById('mute-btn').addEventListener('click', toggleMute);
    document.getElementById('download-video').addEventListener('click', () => openDownload('video'));
    document.getElementById('download-audio').addEventListener('click', () => openDownload('audio'));
    document.getElementById('floating-window').addEventListener('click', openFloatingWindow);

    progressContainer.addEventListener('click', (e) => {
      if (!player || typeof player.getDuration !== 'function') return;
      const rect = progressContainer.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      player.seekTo(pos * player.getDuration(), true);
    });

    window.addEventListener('beforeunload', () => {
      if (timerInterval) clearInterval(timerInterval);
      if (floatingWindowRef && !floatingWindowRef.closed) floatingWindowRef.close();
    });
  </script>
</body>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouRadio Player</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --accent: #6ee7ff;
        --accent2: #7c9dff;
        --text: #e5edff;
        --muted: #9eb2e0;
        --ok: #6df6b0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #05070d;
        color: var(--text);
        min-height: 100vh;
      }

      .video-background { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
      .video-background iframe {
        position: absolute; top: 50%; left: 50%; width: 177.78vh; height: 100vh; min-width: 100vw; min-height: 56.25vw;
        transform: translate(-50%, -50%); pointer-events: none; border: 0;
      }
      .video-background::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle at center, rgba(8,12,22,0.25), rgba(5,7,13,0.84) 70%);
      }

      .container { position: relative; z-index: 1; width: min(1120px, 94vw); margin: 42px auto 72px; }
      .panel {
        background: linear-gradient(160deg, rgba(9, 13, 25, 0.78), rgba(10, 14, 28, 0.55));
        border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; backdrop-filter: blur(10px);
        box-shadow: 0 18px 45px rgba(0,0,0,0.42); padding: 20px;
      }
      .top-row { display:flex; justify-content:space-between; align-items:center; gap: 10px; }
      a.back { color: var(--text); text-decoration:none; opacity: .9; }
      h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); margin: 0; }
      p.subtitle { margin: 8px 0 18px; color: var(--muted); }
      form { display: grid; gap: 12px; }
      input[type="url"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.16); background: rgba(6, 10, 20, 0.8); color: var(--text); font-size: 1rem; }
      button { width: fit-content; padding: 12px 18px; font-size: 0.98rem; border-radius: 12px; border: none; font-weight: 700; background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #0a1224; cursor: pointer; }
      .status { margin-top: 14px; min-height: 24px; color: var(--ok); }
      .layout { margin-top: 24px; display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
      .player-shell { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.14); aspect-ratio: 16 / 9; background: #030508; }
      #player { width: 100%; height: 100%; }
      .player-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; }
      .secondary-btn { padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18); background: rgba(10, 14, 28, 0.72); color: var(--text); font-weight: 600; cursor: pointer; }
      .queue { max-height: 60vh; overflow: auto; }
      .queue h2 { margin: 0 0 12px; font-size: 1rem; color: var(--muted); }
      .queue-item { width: 100%; text-align: left; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 8px; font-size: 0.92rem; background: rgba(10, 14, 28, 0.55); color: var(--text); cursor: pointer; }
      .queue-item.active { border-color: var(--accent); background: rgba(110, 231, 255, 0.12); }
      @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="video-background" aria-hidden="true">
      <iframe id="bg-video" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0&loop=1&playlist=dQw4w9WgXcQ&modestbranding=1&rel=0" title="Fondo de video" allow="autoplay; encrypted-media"></iframe>
    </div>

    <main class="container">
      <section class="panel">
        <div class="top-row">
          <h1>🎵 YouRadio</h1>
          <a class="back" href="index.html">← Inicio</a>
        </div>
        <p class="subtitle">Modo reproductor inteligente.</p>

        <form id="radio-form">
          <label for="youtube-url">Enlace del video musical</label>
          <input id="youtube-url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
          <button type="submit">Iniciar radio inteligente</button>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
      </section>

      <section class="layout">
        <div>
          <div class="player-shell"><div id="player"></div></div>
          <div class="player-actions">
            <button id="download-video" class="secondary-btn" type="button">Descargar video</button>
            <button id="download-audio" class="secondary-btn" type="button">Descargar Musica</button>
            <button id="floating-window" class="secondary-btn" type="button">Ventana flotante</button>
          </div>
        </div>
        <aside class="panel queue">
          <h2>Próximas canciones</h2>
          <div id="queue-list"></div>
        </aside>
      </section>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let ytPlayer;
      let currentIndex = 0;
      let queue = [];
      const videoMetaMap = new Map();
      let playlistRefreshTimer;

      const VIDEO_ID_REGEX = /^[\w-]{11}$/;
      const statusEl = document.getElementById('status');
      const queueListEl = document.getElementById('queue-list');
      const form = document.getElementById('radio-form');
      const input = document.getElementById('youtube-url');
      const downloadVideoBtn = document.getElementById('download-video');
      const downloadAudioBtn = document.getElementById('download-audio');
      const floatingWindowBtn = document.getElementById('floating-window');
      const bgVideo = document.getElementById('bg-video');
      let floatingWindowRef = null;
      let pendingInitialId = null;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#ff8f8f' : 'var(--ok)';
      }
      function normalizeVideoId(rawId) { if (!rawId) return null; const id = rawId.trim().slice(0, 11); return VIDEO_ID_REGEX.test(id) ? id : null; }
      function extractVideoId(url) {
        try {
          const parsed = new URL(url.trim());
          const hostname = parsed.hostname.replace('www.', '');
          if (hostname === 'youtu.be') return normalizeVideoId(parsed.pathname.split('/').filter(Boolean)[0]);
          if (hostname === 'youtube.com' || hostname === 'm.youtube.com') {
            const directId = normalizeVideoId(parsed.searchParams.get('v')); if (directId) return directId;
            const parts = parsed.pathname.split('/').filter(Boolean);
            const shortsIndex = parts.indexOf('shorts'); if (shortsIndex !== -1 && parts[shortsIndex + 1]) return normalizeVideoId(parts[shortsIndex + 1]);
            const embedIndex = parts.indexOf('embed'); if (embedIndex !== -1 && parts[embedIndex + 1]) return normalizeVideoId(parts[embedIndex + 1]);
          }
        } catch { return null; }
        return null;
      }

      async function fetchVideoTitle(videoId) {
        if (!VIDEO_ID_REGEX.test(videoId)) return null;
        if (videoMetaMap.has(videoId)) return videoMetaMap.get(videoId);
        try {
          const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
          if (!response.ok) return null;
          const data = await response.json();
          const title = typeof data.title === 'string' ? data.title.trim() : '';
          if (!title) return null;
          videoMetaMap.set(videoId, title);
          return title;
        } catch { return null; }
      }

      async function hydrateQueueTitles() { const missing = queue.filter((id) => id && !videoMetaMap.has(id)); if (!missing.length) return; await Promise.all(missing.map((id) => fetchVideoTitle(id))); renderQueue(); }
      function syncBackgroundVideo(videoId) { if (!videoId || !bgVideo) return; bgVideo.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&modestbranding=1&rel=0`; }
      function refreshPlaylistFromPlayer() {
        if (!ytPlayer || typeof ytPlayer.getPlaylist !== 'function') return;
        const playlist = ytPlayer.getPlaylist() || []; const playlistIndex = ytPlayer.getPlaylistIndex?.() ?? 0; if (!playlist.length) return;
        queue = playlist; currentIndex = Math.max(playlistIndex, 0); renderQueue(); syncBackgroundVideo(queue[currentIndex]); hydrateQueueTitles();
      }

      function renderQueue() {
        queueListEl.innerHTML = '';
        queue.forEach((videoId, index) => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `queue-item ${index === currentIndex ? 'active' : ''}`;
          const title = videoMetaMap.get(videoId) || `Canción ${index + 1}`;
          item.textContent = `${index + 1}. ${title}`;
          item.addEventListener('click', () => {
            if (!ytPlayer || !queue[index]) return;
            ytPlayer.playVideoAt(index); currentIndex = index; renderQueue(); setStatus(`Reproduciendo: ${title}`); syncBackgroundVideo(queue[index]);
          });
          queueListEl.appendChild(item);
        });
      }

      function getCurrentVideoId() { if (queue[currentIndex]) return queue[currentIndex]; return extractVideoId(input.value); }
      function openDownload(kind) {
        const videoId = getCurrentVideoId();
        if (!videoId) { setStatus('Primero inicia la radio con un enlace válido.', true); return; }
        const targetUrl = kind === 'audio'
          ? `https://v1.y2mate.nu/es/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${videoId}`)}`
          : `https://app.ytdown.to/es7/?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${videoId}`)}`;
        window.open(targetUrl, '_blank', 'noopener,noreferrer');
      }
      function openFloatingWindow() {
        const videoId = getCurrentVideoId();
        if (!videoId) { setStatus('Primero inicia la radio para usar ventana flotante.', true); return; }
        const popupUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
        const features = 'popup=yes,width=460,height=820,menubar=no,toolbar=no,location=no,status=no';
        if (floatingWindowRef && !floatingWindowRef.closed) { floatingWindowRef.location.href = popupUrl; floatingWindowRef.focus(); }
        else { floatingWindowRef = window.open(popupUrl, 'youradio-floating', features); }
        setStatus('Ventana flotante abierta con la canción actual.');
      }

      function startRadioById(firstId) {
        if (!firstId) { setStatus('URL inválida. Usa un enlace de YouTube válido.', true); return; }
        if (!ytPlayer) { setStatus('El reproductor aún no está listo. Intenta en 2 segundos.', true); return; }

        setStatus('Preparando radio inteligente desde recomendaciones de YouTube...');
        if (playlistRefreshTimer) clearInterval(playlistRefreshTimer);

        queue = [firstId]; currentIndex = 0; renderQueue(); syncBackgroundVideo(firstId); hydrateQueueTitles();
        ytPlayer.loadPlaylist({ list: `RD${firstId}`, index: 0, startSeconds: 0, suggestedQuality: 'large' });
        playlistRefreshTimer = setInterval(refreshPlaylistFromPlayer, 1500);

        setTimeout(() => {
          refreshPlaylistFromPlayer();
          if (queue.length > 1) setStatus(`Radio iniciada: ${queue.length} canciones cargadas automáticamente.`);
          else setStatus('Reproduciendo canción base. YouTube puede tardar en exponer recomendaciones.');
        }, 1200);
      }

      function onPlayerStateChange(event) { if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.CUED) refreshPlaylistFromPlayer(); }
      window.onYouTubeIframeAPIReady = function () {
        ytPlayer = new YT.Player('player', {
          height: '100%', width: '100%', videoId: '',
          playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1 },
          events: {
            onStateChange: onPlayerStateChange,
            onReady: () => {
              setStatus('Reproductor listo. Pega una URL para iniciar la radio.');
              if (pendingInitialId) { startRadioById(pendingInitialId); pendingInitialId = null; }
            }
          }
        });
      };

      form.addEventListener('submit', (event) => { event.preventDefault(); startRadioById(extractVideoId(input.value)); });
      downloadVideoBtn.addEventListener('click', () => openDownload('video'));
      downloadAudioBtn.addEventListener('click', () => openDownload('audio'));
      floatingWindowBtn.addEventListener('click', openFloatingWindow);

      window.addEventListener('beforeunload', () => {
        if (playlistRefreshTimer) clearInterval(playlistRefreshTimer);
        if (floatingWindowRef && !floatingWindowRef.closed) floatingWindowRef.close();
      });

      const queryVideoId = normalizeVideoId(new URLSearchParams(window.location.search).get('v'));
      if (queryVideoId) {
        input.value = `https://www.youtube.com/watch?v=${queryVideoId}`;
        pendingInitialId = queryVideoId;
      }
    </script>
  </body>
</html>
