<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouRadio</title>
    <style>
      :root {
        --text: #f2f5ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 10% 20%, rgba(255, 0, 90, 0.18), transparent 38%),
          radial-gradient(circle at 82% 10%, rgba(0, 120, 255, 0.2), transparent 34%),
          linear-gradient(rgba(4, 8, 20, 0.65), rgba(4, 8, 20, 0.85)),
          url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat fixed;
      }
      .hero {
        width: min(780px, 92vw);
        text-align: center;
        padding: 36px 24px;
        border-radius: 26px;
        backdrop-filter: blur(9px);
        background: linear-gradient(160deg, rgba(8, 12, 22, 0.48), rgba(7, 11, 21, 0.24));
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow: 0 22px 56px rgba(0, 0, 0, 0.5);
      }
      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 6vw, 4rem);
        letter-spacing: 0.6px;
      }
      p {
        margin: 6px 0 24px;
        color: rgba(231, 240, 255, 0.94);
        font-size: clamp(1.1rem, 2vw, 2rem);
      }
      form {
        margin: 0 auto;
        width: min(560px, 100%);
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        background: #fff;
        padding: 10px 10px 10px 16px;
      }
      input {
        border: none;
        outline: none;
        width: 100%;
        font-size: 1.1rem;
        color: #24314d;
        background: transparent;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(120deg, #73dcff, #8a9bff);
        color: #101935;
      }
      .hint { margin-top: 12px; font-size: .95rem; opacity: .85; }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1>YouRadio</h1>
      <p>Ingresa tu enlace</p>
      <form id="start-form">
        <input id="youtube-url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
        <button type="submit">Entrar</button>
      </form>
      <div class="hint">Al enviar, se abrirá el reproductor automáticamente.</div>
    </main>

    <script>
      const VIDEO_ID_REGEX = /^[\w-]{11}$/;

      function normalizeVideoId(rawId) {
        if (!rawId) return null;
        const id = rawId.trim().slice(0, 11);
        return VIDEO_ID_REGEX.test(id) ? id : null;
      }

      function extractVideoId(url) {
        try {
          const parsed = new URL(url.trim());
          const hostname = parsed.hostname.replace('www.', '');

          if (hostname === 'youtu.be') {
            return normalizeVideoId(parsed.pathname.split('/').filter(Boolean)[0]);
          }

          if (hostname === 'youtube.com' || hostname === 'm.youtube.com') {
            const directId = normalizeVideoId(parsed.searchParams.get('v'));
            if (directId) return directId;

            const parts = parsed.pathname.split('/').filter(Boolean);
            const shortsIndex = parts.indexOf('shorts');
            if (shortsIndex !== -1 && parts[shortsIndex + 1]) {
              return normalizeVideoId(parts[shortsIndex + 1]);
            }

            const embedIndex = parts.indexOf('embed');
            if (embedIndex !== -1 && parts[embedIndex + 1]) {
              return normalizeVideoId(parts[embedIndex + 1]);
            }
          }
        } catch {
          return null;
        }
        return null;
      }

      window.addEventListener('pageshow', (event) => {
        if (event.persisted) window.location.reload();
      });

      document.getElementById('start-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const url = document.getElementById('youtube-url').value;
        const videoId = extractVideoId(url);

        if (!videoId) {
          alert('Pega una URL de YouTube válida.');
          return;
        }

        window.location.href = `player.html?v=${videoId}&session=${Date.now()}`;
      });
    </script>
  </body>
</html>
