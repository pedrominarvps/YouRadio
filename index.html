<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouRadio - Futurista Sunset Amber</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#050505;
      --amber:#fbbf24;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: white;
      overflow-x: hidden;
    }

    /* Fondo animado estilo Sunset Amber */
    .bg-gradient-animate {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 18% 28%, rgba(251, 191, 36, 0.22) 0%, transparent 38%),
        radial-gradient(circle at 78% 72%, rgba(217, 119, 6, 0.22) 0%, transparent 36%),
        radial-gradient(circle at 50% 55%, rgba(120, 53, 15, 0.20) 0%, transparent 42%),
        linear-gradient(135deg, #130f0b 0%, #050505 55%, #0b0b0b 100%);
      animation: sunsetMove 16s ease-in-out infinite alternate;
    }

    @keyframes sunsetMove {
      from { transform: scale(1) translate3d(0, 0, 0); }
      to { transform: scale(1.08) translate3d(-1.5%, 1.5%, 0); }
    }

    /* Glassmorphism principal */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(251, 191, 36, 0.16);
      box-shadow: 0 25px 60px -18px rgba(0, 0, 0, 0.82);
    }

    .input-glass {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(251, 191, 36, 0.25);
      transition: all 300ms ease;
    }

    .input-glass:focus {
      border-color: var(--amber);
      box-shadow: 0 0 26px rgba(251, 191, 36, 0.22);
      outline: none;
    }

    .btn-glow {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #141414;
      transition: all 300ms ease;
      box-shadow: 0 8px 24px rgba(251, 191, 36, 0.26);
    }

    .btn-glow:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 14px 32px rgba(251, 191, 36, 0.45);
    }

    .interactive {
      transition: all 300ms ease;
    }

    .interactive:hover {
      color: #fff;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
  <div class="bg-gradient-animate" aria-hidden="true"></div>

  <!-- Header minimal, sin soporte/login -->
  <nav class="w-full max-w-7xl px-6 md:px-8 py-6 flex items-center justify-between z-10">
    <div class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-amber-400 text-black flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></svg>
      </div>
      <span>You<span class="text-amber-400">Radio</span></span>
    </div>
    <div class="flex items-center gap-6 text-sm text-gray-300">
      <span class="interactive cursor-default">Modo Futurista</span>
      <span class="interactive cursor-default">Sunset Amber</span>
    </div>
  </nav>

  <main class="flex-grow w-full px-4 py-8 md:py-12 flex items-center justify-center z-10">
    <section class="w-full max-w-4xl glass-card rounded-[2.2rem] p-6 md:p-10">
      <div class="text-center mb-8 md:mb-10">
        <span class="inline-block px-4 py-1 rounded-full text-xs uppercase tracking-widest font-bold text-amber-300 border border-amber-400/30 bg-amber-400/10 mb-5">
          YouRadio Pro
        </span>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-3 drop-shadow-[0_0_20px_rgba(251,191,36,0.18)]">
          Sintoniza <span class="text-amber-400">al instante</span>
        </h1>
        <p class="text-gray-300 text-lg md:text-xl">Pega tu enlace de YouTube y abre el reproductor cinematográfico.</p>
      </div>

      <!-- Form principal: mantiene la conexión con player.html -->
      <form id="start-form" class="w-full max-w-3xl mx-auto">
        <label for="youtube-url" class="block text-sm font-semibold text-gray-300 mb-3 ml-2">Ingresa tu enlace</label>
        <div class="relative">
          <input
            id="youtube-url"
            type="url"
            placeholder="https://www.youtube.com/watch?v=..."
            required
            class="w-full input-glass rounded-2xl px-6 pr-36 py-5 text-base md:text-lg text-white placeholder:text-gray-400"
          />
          <button
            id="tune-button"
            type="submit"
            class="btn-glow absolute right-2 top-1/2 -translate-y-1/2 rounded-xl px-6 py-3 font-bold flex items-center gap-2"
          >
            <span>Sintonizar</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-gray-400 mt-5">Transforma cualquier enlace de video en una experiencia auditiva pura. Simple, rápido y envolvente.</p>
    </section>
  </main>

  <script>
    const VIDEO_ID_REGEX = /^[\w-]{11}$/;

    // Normaliza y valida IDs de YouTube
    function normalizeVideoId(rawId) {
      if (!rawId) return null;
      const id = rawId.trim().slice(0, 11);
      return VIDEO_ID_REGEX.test(id) ? id : null;
    }

    // Mantiene la lógica de extracción robusta (watch, youtu.be, shorts, embed)
    function extractVideoId(url) {
      try {
        const parsed = new URL(url.trim());
        const hostname = parsed.hostname.replace('www.', '');

        if (hostname === 'youtu.be') {
          return normalizeVideoId(parsed.pathname.split('/').filter(Boolean)[0]);
        }

        if (hostname === 'youtube.com' || hostname === 'm.youtube.com') {
          const directId = normalizeVideoId(parsed.searchParams.get('v'));
          if (directId) return directId;

          const parts = parsed.pathname.split('/').filter(Boolean);
          const shortsIndex = parts.indexOf('shorts');
          if (shortsIndex !== -1 && parts[shortsIndex + 1]) {
            return normalizeVideoId(parts[shortsIndex + 1]);
          }

          const embedIndex = parts.indexOf('embed');
          if (embedIndex !== -1 && parts[embedIndex + 1]) {
            return normalizeVideoId(parts[embedIndex + 1]);
          }
        }
      } catch {
        return null;
      }
      return null;
    }

    // Evita restaurar estado viejo desde bfcache
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) window.location.reload();
    });

    // Listener original de envío (conexión directa a la segunda página)
    document.getElementById('start-form').addEventListener('submit', (event) => {
      event.preventDefault();
      const url = document.getElementById('youtube-url').value;
      const videoId = extractVideoId(url);

      if (!videoId) {
        alert('Pega una URL de YouTube válida.');
        return;
      }

      window.location.href = `player.html?v=${videoId}&session=${Date.now()}`;
    });
  </script>
</body>
</html>
